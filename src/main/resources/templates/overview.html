<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odaat | Overview</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/overview.css">
</head>
<body>
    <!-- Header -->
    <div th:replace="fragments/common :: header"></div>
    <!-- Modal -->
    <div id="overviewModal" class="hidden modal-wrapper" th:insert="fragments/modals :: theme-modal"></div>
    <!-- Ongoing Themes -->
    <div th:replace="fragments/themes :: theme-group (
        title = 'Ongoing',
        themes = ${currentThemes},
        projectDescription = ${projectDescription},
        routineDescription = ${routineDescription},
        controls = ${ {'byProgram', 'newBtn'} },
        addBtnId = 'addThemeBtn',
        programs = ${programs},
        userImgDir = ${userImgDir}
    )"></div>
    <!-- Previous Themes -->
    <div th:replace="fragments/themes :: theme-group (
        title = 'Previous',
        themes = ${previousThemes},
        projectDescriptor = ${projectDescriptor},
        routineDescriptor = ${routineDescriptor},
        controls = ${ {'sortOption'} },
        addBtnId = '',
        programs = ${programs},
        userImgDir = ${userImgDir}
    )"></div>
    <script>
        const MODAL_ID = 'overviewModal';
        const ADD_BTN_ID = 'addThemeBtn';
    </script>
    <script src="js/overview.js"></script>
</body>
</html>
