<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odaat | Themes</title>
    <link rel="stylesheet" href="css/overview.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <main th:fragment="theme-group (title, themes, controls, programs, userImgDir)">
        <header class="title-container">
            <p class="font-title font-big font-bold" th:replace="${title}"></p>
            <!-- If "sortOption" is included in ${controls} -->
            <div th:replace="fragments/common :: drop-down (
                label='Sort by:', options=${ {'Program', 'Time Spent', 'Most Recent'} }
            )"></div>
            <!-- If "byProgram" is included in ${controls} -->
            <div th:replace="fragments/common :: drop-down (
                label='View:', options=${programs}
            )"></div>
            <!-- If "newBtn" is included in ${controls} -->
            <button type="button">Add New</button>
        </header>

        <div class="theme-wrapper">
            <div class="theme-container" th:each="theme : ${themes}">
                <label class="menu-container" th:classappend="${#fields.exists(theme, 'isActive') ? 'bg-black' : ''}">
                    <img src="/images/ui/menu.png" alt="Menu"/>
                    <select>
                        <option value="" disabled selected></option>
                        <option value="">Mark as Completed</option>
                        <option value="">Edit</option>
                    </select>
                </label>
                <div class="theme-header" th:classappend="${#fields.exists(theme, 'isActive') ? 'bg-black' : ''}">
                    <img src="${userImgDIr + theme.imgName}" alt="${theme.name}"/>
                    <div class="theme-title-container">
                        <h3 th:text="${theme.name}"></h3>
                        <!-- Show {completedAt} if completed. Otherwise, show 'Present' if routine, {deadline} if project. -->
                        <p>
                            <span th:text="${theme.startedAt}"></span>
                            ~
                            <span th:text="${
                                completedAt != null 
                                ? compltedAt 
                                : (#fields.exists(theme, 'isActive')
                                    ? 'Present'
                                    : theme.deadline)
                            }"></span>
                        </p>
                        <!-- Show progress if project, repeated days and time otherwise (it'd be a routine). -->
                        <progress   th:if="${fields.exists(theme, 'timeEstimated')}"
                                    th:value="${(timeSpent/timeEstimated)*100}" max="100">
                        </progress>
                        <p th:unless="${fields.exists(theme, 'timeEstimated')}">
                            <span th:text="${theme.repeatedOn}"></span>
                            .<span th:text="${theme.startTime}"></span> ~ <span th:text="${theme.endTime}"></span>
                        </p>
                    </div>
                </div>
                <div class="theme-description-container">
                    <div th:text="${theme.description}"></div>
                    <p class="font-small font-thin font-right">[<span th:text="${theme.timeSpent}"></span>h]</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
