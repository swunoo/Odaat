<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odaat | Modals</title>
</head>
<body>
    <form class="modal-container" th:fragment="theme-modal (programs)">
        <img id="mt-close" src="/images/ui/close.png" alt="Close"/>
        <header>
            <img id="mt-img" src="/images/ui/placeholder.png" alt="Click to Edit"/>
            <input id="mt-name" class="font-title font-big font-bold" placeholder="THEME NAME (click to edit)"/>
        </header>
        <div>
            <div th:replace="fragments/common :: drop-down (
                label='Type', options=${ {'PROJECT', 'ROUTINE'} }, id='mt-type')"></div>
            <div th:replace="fragments/common :: drop-down (
                label='Program', options=${programs}, id='mt-program')"></div>
            <label id="mt-details">
                <p>Details</p>
                <textarea rows="5"></textarea>
            </label>
            <div th:replace="fragments/common :: input (label='Start', id='mt-start')"></div>
            <div th:replace="fragments/common :: input (label='Deadline', id='mt-deadline')"></div>
            <div th:replace="fragments/common :: input (label='Days', id='mt-days')"></div>
            <div th:replace="fragments/common :: drop-down (
                label='Status', options=${ {'IN PROG.', 'ENDED'} }, id='mt-status')"></div>
            <div th:replace="fragments/common :: input (label='End', id='mt-end', disabled='true')"></div>
            <div th:replace="fragments/common :: input (label='Spent', id='mt-spent')"></div>
            <div th:replace="fragments/common :: input (label='Estimated', id='mt-estimated')"></div>
            <div th:replace="fragments/common :: input (label='From', id='mt-from')"></div>
            <div th:replace="fragments/common :: input (label='To', id='mt-to')"></div>
        </div>
        <button id="mt-submit" class="btn-blue-dark" type="submit">CREATE</button>
    </form>
</body>
</html>
