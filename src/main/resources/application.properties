# Database Connection
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/odaat_test
spring.datasource.username=dev
spring.datasource.password=dev23

# Database Migration
spring.flyway.url=jdbc:postgresql://localhost:5432/odaat_test
spring.flyway.schemas=public
spring.flyway.user=dev
spring.flyway.password=dev23
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Flyway configuration
spring.flyway.ignore-comments=true

# Server
server.port=9090

# Security
spring.security.user.name=admin
spring.security.user.password=password
spring.security.user.roles=USER,ADMIN

# Mybatis
mybatis.type-handlers-package=dev.odaat.Mapper.TypeHandlers

# App
app.dir.userimg=/images/user/
spring.profiles.active=psql_v1