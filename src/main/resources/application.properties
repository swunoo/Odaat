# Database Connection
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/odaat
spring.datasource.username=dev
spring.datasource.password=dev23

# Database Migration
spring.flyway.url=jdbc:postgresql://localhost:5432/odaat
spring.flyway.schemas=public
spring.flyway.user=dev
spring.flyway.password=dev23
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Flyway configuration
spring.flyway.ignore-comments=true


# Server
server.port=9090

# Security
spring.security.user.name=a
spring.security.user.password=a
spring.security.user.roles=USER,ADMIN

# Mybatis
mybatis.config-location=classpath:mybatis-config.xml

# App
app.dir.userimg=/images/user/